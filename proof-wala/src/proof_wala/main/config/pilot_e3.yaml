# Pilot E3: real multilingual training.
#
# This config follows scripts/proofwala_training_settings_reference.yaml.
# Current final path uses the frozen released ProofWalaDataset multilingual
# training split. If the token-matched Lean+Coq mixture is materialized later,
# update training_data_dir to that materialized directory before final runs.

defaults:
  - model_settings: codet5_small_2048.yaml
  - training_settings: basic_100_010
  - override hydra/job_logging: 'disabled'

name: pilot-e3-real-multilingual
experiment_type: 'Training'

model_settings:
  logging_dir: <root>/runs/E3/logs/model

training_data_settings:
  training_data_dir: <root>/data/frozen_splits/e3_multilingual_train_compat
  training_meta_filename: local.meta.json
  training_data_log_dir: <root>/runs/E3/data_logs
  training_dataset_type: CodeT5TrainingDataset
  training_data_formatter_type: CodeT5PromptTrainingDataFormatter
  training_dataset_args:
    characters_per_token: 3.6
    max_tokens: 2048
    no_steps: True
  evals:
    - eval_name: lean_fixed_subset
      eval_data_dir: <root>/data/frozen_splits/lean_eval_1000
      eval_meta_filename: local.meta.json
      eval_data_log_dir: <root>/runs/E3/eval_logs
  eval_data_dir:
  eval_meta_filename:
  eval_data_log_dir:
  test_data_dir:
  test_meta_filename:
  test_data_log_dir:

training_settings:
  train_eval_split: False
  train_percentage: 1.0
  eval_percentage: 1.0
  test_percentage: 1.0
  training_args:
    output_dir: <root>/runs/E3/model
    logging_dir: <root>/runs/E3/logs/trainer
    overwrite_output_dir: False
    resume_from_checkpoint: False
    do_train: True
    do_eval: True
    do_predict: False
    per_device_train_batch_size: 1
    per_device_eval_batch_size: 1
    gradient_accumulation_steps: 1
    learning_rate: 2e-4
    weight_decay: 0.001
    max_grad_norm: 0.3
    max_steps: 5000
    lr_scheduler_type: cosine
    warmup_ratio: 0.03
    warmup_steps: 0
    logging_strategy: steps
    logging_steps: 1
    logging_first_step: True
    save_strategy: steps
    save_steps: 500
    save_total_limit: 1
    save_only_model: False
    evaluation_strategy: steps
    eval_steps: 500
    load_best_model_at_end: True
    metric_for_best_model: exact_match
    greater_is_better: True
    optim: adamw_torch
    group_by_length: True
    gradient_checkpointing: True
    report_to: "none"
    fp16: True
    seed: 42
    data_seed: 42
