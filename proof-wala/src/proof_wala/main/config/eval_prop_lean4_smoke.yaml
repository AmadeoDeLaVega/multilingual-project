# @package _global_
defaults:
  - benchmark: simple_lean_test
  - eval_settings: codet5_beam_16
  - env_settings: bm25_retrieval
  - override hydra/job_logging: 'disabled'

log_dir: .log/proofs_logs/prop_lean4_smoke

eval_settings:
  proof_dump_dir: .log/proofs_dumps/prop_lean4_smoke
  model_name: <override-with-trained-model-path>
  checkpoint_dir: .log/checkpoints/prop_lean4_smoke
  should_checkpoint: True
  proof_retries: 1
  timeout_in_secs: 60
  max_proof_depth: 20
  width: 16
  model_parallelism: 1
  temperature: 0.75
  do_sample: True
  search_params:
    beam_width: 16

benchmark:
  name: prop_lean4_smoke
  timeout_per_theorem_in_secs: 180
  datasets:
  - project: src/proof_wala/data/proofs/lean/lean4_proj
    files:
    - path: Lean4Proj/PropSmoke/PropTrue.lean
      theorems:
      - prop_true
    - path: Lean4Proj/PropSmoke/PropId.lean
      theorems:
      - prop_id
    - path: Lean4Proj/PropSmoke/PropAndIntro.lean
      theorems:
      - prop_and_intro
    - path: Lean4Proj/PropSmoke/PropAndLeft.lean
      theorems:
      - prop_and_left
