# @package _global_
defaults:
  - benchmark: simple_lean_test
  - eval_settings: codet5_beam_16
  - env_settings: bm25_retrieval
  - override hydra/job_logging: 'disabled'

log_dir: .log/proofs_logs/readme_lean4_smoke

eval_settings:
  proof_dump_dir: .log/proofs_dumps/readme_lean4_smoke
  model_name: <override-with-trained-model-path>
  checkpoint_dir: .log/checkpoints/readme_lean4_smoke
  should_checkpoint: True
  proof_retries: 1
  timeout_in_secs: 60
  max_proof_depth: 20
  width: 16
  model_parallelism: 1
  temperature: 0.75
  do_sample: True
  search_params:
    beam_width: 16

benchmark:
  name: readme_lean4_smoke
  timeout_per_theorem_in_secs: 180
  datasets:
  - project: src/proof_wala/data/proofs/lean/lean4_proj
    files:
    - path: Lean4Proj/ReadmeSmoke/NPlusZero.lean
      theorems:
      - n_plus_zero
    - path: Lean4Proj/ReadmeSmoke/NPlusSucc.lean
      theorems:
      - n_plus_succ
    - path: Lean4Proj/ReadmeSmoke/NZeroPlus.lean
      theorems:
      - n_zero_plus
    - path: Lean4Proj/ReadmeSmoke/NSuccPlus.lean
      theorems:
      - n_succ_plus
