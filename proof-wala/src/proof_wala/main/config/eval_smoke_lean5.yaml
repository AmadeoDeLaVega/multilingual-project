# @package _global_
defaults:
  - benchmark: simple_lean_test
  - eval_settings: codet5_beam_16
  - env_settings: bm25_retrieval
  - override hydra/job_logging: 'disabled'

log_dir: .log/proofs_logs/smoke_lean5

eval_settings:
  proof_dump_dir: .log/proofs_dumps/smoke_lean5
  model_name: <override-with-trained-model-path>
  checkpoint_dir: .log/checkpoints/smoke_lean5
  should_checkpoint: True
  proof_retries: 1
  timeout_in_secs: 60
  max_proof_depth: 20
  width: 16
  model_parallelism: 1
  temperature: 0.75
  do_sample: True
  search_params:
    beam_width: 16

benchmark:
  name: simple_lean5_smoke
  timeout_per_theorem_in_secs: 180
  datasets:
  - project: src/proof_wala/data/proofs/lean/lean4_proj
    files:
    - path: Lean4Proj/Smoke.lean
      theorems:
      - smoke_true
      - smoke_id_prop
      - smoke_and_intro
      - smoke_and_left
      - smoke_and_right
